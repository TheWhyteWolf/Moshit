name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Qt runtime libs (for the offscreen GUI tests)
        run: |
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0 fontconfig

      - name: Install moshit
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui,test]"

      - name: ffmpeg capabilities (diagnostic)
        run: python -m moshit.cli probe

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest
